name: ClayLab
options:
  bundleIdPrefix: com.claylab
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 6G3Q27J6NB
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  ClayLab:
    type: application
    platform: iOS
    sources:
      - path: ClayLab/ClayLab
        excludes:
          - "Info.plist"
    resources:
      - path: ClayLab/ClayLab/Assets.xcassets
    info:
      path: ClayLab/ClayLab/Info.plist
      properties:
        CFBundleDisplayName: ClayLab
        CFBundleName: $(PRODUCT_NAME)
        LSRequiresIPhoneOS: true
        NSPhotoLibraryUsageDescription: "ClayLab lets you attach photos of your pieces so you can compare glaze results and trim profiles over time. Photos are stored privately on this device."
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Light
        UILaunchScreen:
          UIColorName: Bone
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claylab.app
