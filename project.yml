name: Stoneware
options:
  bundleIdPrefix: com.stoneware
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 6G3Q27J6NB
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  Stoneware:
    type: application
    platform: iOS
    sources:
      - path: Stoneware/Stoneware
        excludes:
          - "Info.plist"
    resources:
      - path: Stoneware/Stoneware/Assets.xcassets
    info:
      path: Stoneware/Stoneware/Info.plist
      properties:
        CFBundleDisplayName: Stoneware
        CFBundleName: $(PRODUCT_NAME)
        LSRequiresIPhoneOS: true
        NSPhotoLibraryUsageDescription: "Stoneware lets you attach photos of your pieces so you can compare glaze results and trim profiles over time. Photos are stored privately on this device."
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Light
        UILaunchScreen:
          UIColorName: Bone
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stoneware.app
  StonewareUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Stoneware/StonewareUITests
    dependencies:
      - target: Stoneware
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stoneware.app.uitests
        TEST_TARGET_NAME: Stoneware
schemes:
  Stoneware:
    build:
      targets:
        Stoneware: all
        StonewareUITests: [test]
    test:
      gatherCoverageData: false
      targets:
        - StonewareUITests
    run:
      config: Debug
    archive:
      config: Release
